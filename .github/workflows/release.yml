name: Release

on:
  push:
    tags:
      - 'v*'

env:
  RUSTFLAGS: --allow=unexpected_cfgs

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --workspace
      # Release assets are keyed by file basename; the platform suffix must be
      # on the FILE, not just the artifact directory, or the three platforms'
      # binaries collide into one ambiguous asset on the release page.
      - name: Rename binaries with platform suffix
        shell: bash
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          cp "target/release/arithma$ext" "arithma-${{ matrix.suffix }}$ext"
          cp "target/release/arithma-mcp$ext" "arithma-mcp-${{ matrix.suffix }}$ext"
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            arithma-${{ matrix.suffix }}*
            arithma-mcp-${{ matrix.suffix }}*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify asset set and write checksums
        working-directory: artifacts
        run: |
          count=$(ls | wc -l)
          if [ "$count" -ne 6 ]; then
            echo "Expected 6 platform-suffixed binaries, found $count:" >&2
            ls >&2
            exit 1
          fi
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
